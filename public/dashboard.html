<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Physics Machine Shop — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--m:#881C1C;--md:#5c1212;--ml:#f9f0f0;--g:#c8a951;--ink:#1a1a1a;--mu:#666;--bo:#d8d0c8;--bg:#faf8f5;--wh:#fff;--r:4px;--sh:0 2px 12px rgba(0,0,0,.08);--green:#1a5c2a;--blue:#2563eb;--warn:#7a4f00}
body{font-family:'EB Garamond',Georgia,serif;font-size:16px;line-height:1.6;color:var(--ink);background:var(--bg);min-height:100vh}
.ah{background:var(--m);color:#fff;border-bottom:3px solid var(--g)}
.hi{max-width:1100px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.hl{display:flex;align-items:center;gap:16px}
.hb{width:44px;height:44px;background:var(--g);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.ht{font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.8;font-family:'DM Mono',monospace}
.hs{font-size:19px;font-weight:600}
.hr{font-size:11px;font-family:'DM Mono',monospace;opacity:.6;text-align:right}
.main{max-width:1100px;margin:0 auto;padding:28px 24px 60px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.card{background:var(--wh);border:1px solid var(--bo);border-radius:var(--r);padding:18px 22px;box-shadow:var(--sh);border-top:3px solid var(--m)}
.cl{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--mu);margin-bottom:5px}
.cv{font-size:26px;font-weight:600;line-height:1;font-family:'DM Mono',monospace}
.cs{font-size:12px;color:var(--mu);margin-top:4px;font-family:'DM Mono',monospace}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-card{background:var(--wh);border:1px solid var(--bo);border-radius:var(--r);padding:22px;box-shadow:var(--sh)}
.ct{font-size:11px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.1em;color:var(--m);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--ml)}
.bar-row{margin-bottom:8px}
.bar-top{display:flex;justify-content:space-between;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:3px;color:var(--ink)}
.bar-bg{background:var(--bo);border-radius:3px;height:10px}
.bar-fill{border-radius:3px;height:10px;transition:width .4s}
.toolbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:8px 12px;border:1px solid var(--bo);border-radius:var(--r);font-family:'EB Garamond',serif;font-size:15px;background:var(--bg);color:var(--ink);outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--m)}
.toolbar input{width:200px}
.btn{padding:8px 18px;background:var(--m);color:#fff;border:none;border-radius:var(--r);font-family:'DM Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em;cursor:pointer}
.btn:hover{background:var(--md)}
.tbl-wrap{overflow-x:auto;background:var(--wh);border:1px solid var(--bo);border-radius:var(--r);box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--m);color:#fff}
th{padding:10px 12px;text-align:left;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;font-weight:500}
td{padding:9px 12px;border-bottom:1px solid var(--bo);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--ml)}
.jid{font-family:'DM Mono',monospace;font-size:11px;color:var(--m);font-weight:600;white-space:nowrap}
.chip{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-family:'DM Mono',monospace;font-weight:500;white-space:nowrap}
.s0{background:#fef3cd44;color:#856404;border:1px solid #fef3cd}
.s1{background:#cfe2ff44;color:#084298;border:1px solid #cfe2ff}
.s2{background:#d1ecf144;color:#0c5460;border:1px solid #d1ecf1}
.s3{background:#d4edda44;color:#155724;border:1px solid #d4edda}
.s4{background:#fff3cd44;color:#856404;border:1px solid #fff3cd}
.s5{background:#e2e3e544;color:#383d41;border:1px solid #e2e3e5}
.vp{color:#8b1c1c;font-weight:600;font-family:'DM Mono',monospace;font-size:12px}
.vn{color:var(--green);font-weight:600;font-family:'DM Mono',monospace;font-size:12px}
.mu{color:var(--mu);font-style:italic;font-size:12px}
.loading{text-align:center;padding:60px;color:var(--mu);font-family:'DM Mono',monospace;font-size:13px}
@media(max-width:700px){.cards{grid-template-columns:1fr 1fr}.charts{grid-template-columns:1fr}.toolbar input{width:100%}}
</style>
</head>
<body>
<header class="ah">
  <div class="hi">
    <div class="hl">
      <div class="hb">⚙️</div>
      <div>
        <div class="ht">University of Massachusetts Amherst</div>
        <div class="hs">Physics &amp; Astronomy Machine Shop</div>
      </div>
    </div>
    <div class="hr" id="last-update">Loading…</div>
  </div>
</header>
<main class="main">
  <div class="cards" id="cards"><div class="loading">Loading…</div></div>
  <div class="charts" id="charts"></div>
  <div class="toolbar">
    <input type="text" id="search" placeholder="Search…" oninput="render()">
    <select id="sf" onchange="render()">
      <option value="">All statuses</option>
      <option>Pending Shop Review</option>
      <option>Needs Discussion</option>
      <option>Pending PI Approval</option>
      <option>Approved</option>
      <option>Needs Clarification</option>
      <option>Complete</option>
    </select>
    <button class="btn" onclick="load()">↻ Refresh</button>
  </div>
  <div class="tbl-wrap" id="tbl"><div class="loading">Loading jobs…</div></div>
</main>
<script>
const SS='1m1YONVhj45N-90-JC8dBuMwLaZuhho3i0Y1kznNrO4I';
const URL='https://docs.google.com/spreadsheets/d/'+SS+'/gviz/tq?tqx=out:csv&sheet=Jobs&t=';
let jobs=[];

function csv(t){
  const rows=[];
  for(const line of t.split('\n')){
    const row=[];let q=false,c='';
    for(const ch of line){
      if(ch==='"')q=!q;
      else if((ch===','||ch==='\t')&&!q){row.push(c);c='';}
      else c+=ch;
    }
    row.push(c);
    if(row.some(v=>v.trim()))rows.push(row.map(v=>v.trim()));
  }
  return rows;
}

function sc(s){
  if(!s)return 'mu';
  if(s.includes('Pending Shop'))return 's0 chip';
  if(s.includes('Discussion'))return 's1 chip';
  if(s.includes('PI Approval'))return 's2 chip';
  if(s==='Approved')return 's3 chip';
  if(s.includes('Clarification'))return 's4 chip';
  if(s==='Complete')return 's5 chip';
  return 'chip';
}

function bar(label,val,max,color){
  const p=max>0?Math.round((val/max)*100):0;
  return '<div class="bar-row"><div class="bar-top"><span>'+label+'</span><span>'+val+'</span></div>'+
    '<div class="bar-bg"><div class="bar-fill" style="width:'+p+'%;background:'+color+'"></div></div></div>';
}

function fmt$(v){return v?'$'+Math.round(parseFloat(v)||0).toLocaleString():'<span class="mu">—</span>';}
function fmt(v){return v&&v.trim()?v:'<span class="mu">—</span>';}

function renderCards(j){
  const total=j.length;
  const pend=j.filter(r=>r[2]==='Pending Shop Review'||r[2]==='Needs Discussion').length;
  const appr=j.filter(r=>r[2]==='Approved').length;
  const done=j.filter(r=>r[2]==='Complete').length;
  let estT=0,actT=0,variance=0;
  j.forEach(r=>{estT+=parseFloat(r[17])||0;if(r[2]==='Complete'){actT+=parseFloat(r[27])||0;variance+=parseFloat(r[28])||0;}});
  function card(l,v,s,c){
    return '<div class="card" style="border-top-color:'+c+'"><div class="cl">'+l+'</div><div class="cv" style="color:'+c+'">'+v+'</div><div class="cs">'+s+'</div></div>';
  }
  document.getElementById('cards').innerHTML=
    card('Total Jobs',total,total+' job'+(total!==1?'s':''),'var(--m)')+
    card('Pending',pend,pend+' awaiting action','var(--warn)')+
    card('Est. Revenue','$'+Math.round(estT).toLocaleString(),'labor + parts','var(--blue)')+
    card('Complete',done,done>0?'variance: '+(variance>=0?'+':'')+'$'+Math.round(variance).toLocaleString():'no completed jobs','var(--green)');
}

function renderCharts(j){
  const bS={},bD={},bP={},bT={};
  const SC={'Pending Shop Review':'#c8a951','Needs Discussion':'var(--blue)','Pending PI Approval':'var(--m)','Approved':'var(--green)','Needs Clarification':'var(--warn)','Complete':'#555'};
  j.forEach(r=>{
    const s=r[2]||'Unknown',d=r[6]||'?',p=r[7]||'?',t=r[10]||'?';
    bS[s]=(bS[s]||0)+1;bD[d]=(bD[d]||0)+1;bP[p]=(bP[p]||0)+1;bT[t]=(bT[t]||0)+1;
  });
  const mS=Math.max(1,...Object.values(bS));
  const mD=Math.max(1,...Object.values(bD));
  const mP=Math.max(1,...Object.values(bP));
  const mT=Math.max(1,...Object.values(bT));
  function chartCard(title,entries,max,colorFn){
    const bars=Object.entries(entries).sort((a,b)=>b[1]-a[1]).map(([k,v])=>bar(k,v,max,colorFn(k))).join('');
    return '<div class="chart-card"><div class="ct">'+title+'</div>'+bars+'</div>';
  }
  document.getElementById('charts').innerHTML=
    chartCard('By Status',bS,mS,k=>SC[k]||'var(--mu)')+
    chartCard('By Department',bD,mD,()=>'var(--blue)')+
    chartCard('By Job Type',bT,mT,()=>'var(--m)')+
    chartCard('By PI / Faculty',bP,mP,()=>'var(--g)');
}

function render(){
  const q=document.getElementById('search').value.toLowerCase();
  const sf=document.getElementById('sf').value;
  let rows=jobs.filter(r=>{
    if(sf&&r[2]!==sf)return false;
    if(q)return r.join(' ').toLowerCase().includes(q);
    return true;
  }).sort((a,b)=>(b[1]||'').localeCompare(a[1]||''));

  if(!rows.length){document.getElementById('tbl').innerHTML='<div class="loading">No jobs match.</div>';return;}

  const thead='<tr>'+['Job ID','Job Name','Status','Submitter','Dept','PI','Type','Est Hrs','Est Total','Actual','Variance','Speedtype'].map(h=>'<th>'+h+'</th>').join('')+'</tr>';
  const tbody=rows.map(r=>{
    const v=r[28]!==''&&r[28]!==undefined&&r[28]!==null?parseFloat(r[28]):null;
    const vhtml=v!==null?'<span class="'+(v>0?'vp':'vn')+'">'+(v>=0?'+':'')+'$'+Math.round(v).toLocaleString()+'</span>':'<span class="mu">—</span>';
    return '<tr>'+
      '<td class="jid">'+fmt(r[0])+'</td>'+
      '<td>'+fmt(r[9])+'</td>'+
      '<td><span class="'+sc(r[2])+'">'+fmt(r[2])+'</span></td>'+
      '<td>'+fmt(r[3])+'</td>'+
      '<td style="font-size:12px">'+fmt(r[6])+'</td>'+
      '<td>'+fmt(r[7])+'</td>'+
      '<td style="font-size:12px">'+fmt(r[10])+'</td>'+
      '<td style="font-family:'DM Mono',monospace;font-size:12px">'+(r[15]?r[15]+'h':'<span class="mu">—</span>')+'</td>'+
      '<td style="font-family:'DM Mono',monospace;font-size:12px">'+fmt$(r[17])+'</td>'+
      '<td style="font-family:'DM Mono',monospace;font-size:12px">'+fmt$(r[27])+'</td>'+
      '<td>'+vhtml+'</td>'+
      '<td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--green)">'+(r[23]?'✔ on file':'<span class="mu">—</span>')+'</td>'+
    '</tr>';
  }).join('');

  document.getElementById('tbl').innerHTML='<table><thead>'+thead+'</thead><tbody>'+tbody+'</tbody></table>';
}

async function load(){
  try{
    document.getElementById('last-update').textContent='Refreshing…';
    const r=await fetch(URL+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const rows=csv(await r.text());
    jobs=rows.filter(r=>r[0]&&r[0]!=='Job ID'&&r[0].trim());
    renderCards(jobs);
    renderCharts(jobs);
    render();
    document.getElementById('last-update').textContent='Updated '+new Date().toLocaleTimeString()+' · auto-refreshes every 2 min';
  }catch(e){
    document.getElementById('tbl').innerHTML='<div class="loading" style="color:var(--m)">Error: '+e.message+'</div>';
    document.getElementById('last-update').textContent='Error loading data';
  }
}
load();
setInterval(load,120000);
</script>
</body>
</html>
